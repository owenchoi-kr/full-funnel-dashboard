<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Plan Full Funnel</title>
<style>
:root{--bg:#ffffff;--s1:#f9fafb;--s2:#f3f4f6;--bd:#e5e7eb;--tx:#111827;--tx2:#6b7280;--tx3:#9ca3af;--acc:#4f46e5;--accg:rgba(79,70,229,.08);--grn:#16a34a;--grng:rgba(22,163,74,.08);--red:#dc2626;--redg:rgba(220,38,38,.06);--ylw:#ca8a04;--ylwg:rgba(202,138,4,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1060px;margin:0 auto;padding:24px 20px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:1px solid var(--bd);margin-bottom:20px}
.hdr h1{font-size:18px;font-weight:700}.hdr h1 b{color:var(--acc)}
.hdr .sub{font-size:10px;color:var(--tx3);margin-top:2px}
.hdr-r{font-size:9px;color:var(--tx3);text-align:right}

/* Dual Hero: Active Orgs + MRR */
.hero-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:640px){.hero-row{grid-template-columns:1fr}}
.hero-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:20px}
.hero-label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.hero-val{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums}
.hero-sub{font-size:11px;color:var(--tx3);margin-top:4px}
.hero-sub b{color:var(--tx2)}
.hero-bar{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;margin-top:8px}
.hero-fill{height:100%;border-radius:4px;transition:width .6s}
.hero-bar-label{display:flex;justify-content:space-between;font-size:9px;color:var(--tx3);margin-top:3px}

/* Countdown */
.countdown{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.cd-item{text-align:center;flex:1;min-width:100px}
.cd-val{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
.cd-label{font-size:9px;color:var(--tx3);margin-top:1px}

/* Bottleneck */
.banner{border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.banner.red{background:var(--redg);border:1px solid rgba(239,68,68,.2)}
.banner .btitle{font-size:12px;font-weight:700}
.banner .bdesc{font-size:10px;color:var(--tx2);margin-top:2px}

/* Funnel (4 cards: Visitor→Signup→SDK→Paid) */
.funnel-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:700px){.funnel-row{grid-template-columns:1fr 1fr}}
.fc{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;position:relative}
.fc:hover{border-color:var(--acc)}
.fc.worst{border-color:var(--red);box-shadow:0 0 16px rgba(239,68,68,.06)}
.fc .f-stage{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px}
.fc .f-dri{font-size:8px;color:var(--tx3);margin-top:1px;margin-bottom:6px}
.fc .f-actual{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.fc .f-wow{font-size:10px;font-weight:600;margin-top:4px}
.fc .f-target{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;font-size:10px;color:var(--tx3)}
.fc .f-target b{color:var(--tx2)}
.fc .f-gap-track{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;margin-top:4px}
.fc .f-gap-fill{height:100%;border-radius:3px}
.fc .f-gap-pct{font-size:10px;font-weight:700;margin-top:3px}
.fc .f-conv{position:absolute;top:10px;right:10px;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:700}
.f-conv.red{background:var(--redg);color:var(--red)}
.f-conv.ylw{background:var(--ylwg);color:var(--ylw)}
.f-conv.grn{background:var(--grng);color:var(--grn)}
.spark{display:flex;align-items:flex-end;gap:1px;height:28px;margin-top:8px}
.spark div{flex:1;border-radius:1px 1px 0 0}

/* Sections */
.section{margin-bottom:20px}
.st{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.st::before{content:'';width:3px;height:12px;background:var(--acc);border-radius:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
@media(max-width:700px){.g2{grid-template-columns:1fr}}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px;overflow:hidden}

/* CAC Chart */
.cac-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px}
.cac-name{min-width:70px;font-weight:600}
.cac-bar-wrap{flex:1;height:16px;background:var(--s2);border-radius:3px;overflow:hidden}
.cac-bar{height:100%;border-radius:3px}
.cac-val{min-width:80px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.cac-badge{font-size:8px;padding:1px 5px;border-radius:6px;font-weight:700}

/* Mini bars */
.mbar{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mbar .ml{font-size:10px;font-weight:600;min-width:26px;text-align:right}
.mbar .mt{flex:1;height:10px;background:var(--s2);border-radius:3px;overflow:hidden}
.mbar .mf{height:100%;border-radius:3px}
.mbar .mv{font-size:9px;color:var(--tx2);min-width:70px;font-variant-numeric:tabular-nums}

/* Sliders */
.sliders{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px}
.sl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.sl-top{display:flex;justify-content:space-between;margin-bottom:2px}
.sl-n{font-size:10px;color:var(--tx2)}
.sl-v{font-size:12px;font-weight:700;color:var(--acc);font-variant-numeric:tabular-nums}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--s2);border-radius:2px;outline:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--acc);cursor:pointer}
.sim-out{margin-top:12px;padding:12px;background:var(--s2);border-radius:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
.sim-out .so-label{font-size:9px;color:var(--tx3)}
.sim-out .so-val{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}

.foot{text-align:center;font-size:9px;color:var(--tx3);padding:12px 0;border-top:1px solid var(--bd);margin-top:8px}
.foot a{color:var(--acc);text-decoration:none}
/* Slack copy button */
.slack-btn{background:var(--acc);color:white;border:none;padding:8px 16px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;margin:12px auto;display:block}
.slack-btn:hover{opacity:.9}
.slack-btn.copied{background:var(--grn)}
/* Waste callout */
.waste{margin-top:8px;padding:8px 10px;background:var(--redg);border-radius:6px;font-size:10px;color:var(--red);font-weight:600}
/* SDK footnote */
.footnote-badge{font-size:8px;color:var(--ylw);background:var(--ylwg);padding:1px 5px;border-radius:4px;margin-left:4px}
.loading{text-align:center;padding:80px;color:var(--tx3)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div><h1><b>Core Plan</b> 전체 퍼널</h1><div class="sub">Scalable Product Squad</div></div>
    <div class="hdr-r"><div id="sync-ts"></div></div>
  </div>
  <div id="loading" class="loading"><div class="spinner"></div><p style="margin-top:10px;font-size:11px">데이터 불러오는 중...</p></div>
  <div id="app" style="display:none">
    <div class="hero-row" id="heroes"></div>
    <div class="countdown" id="countdown"></div>
    <div id="bottleneck"></div>
    <div class="funnel-row" id="funnel"></div>
    <div class="g2">
      <div class="card"><div class="st">조직 건강 현황</div><div id="health"></div></div>
      <div class="card"><div class="st">주간 신규 조직</div><div id="weekly"></div></div>
    </div>
    <div class="g2">
      <div class="card"><div class="st">채널별 CAC</div><div id="cac"></div></div>
      <div class="card"><div class="st">활성률 기준 국가</div><div id="countries"></div></div>
    </div>
    <button class="slack-btn" onclick="copySlack()">Slack에 복사</button>
    <div class="sliders section">
      <div class="st">시나리오 시뮬레이터</div>
      <div style="font-size:9px;color:var(--tx3);margin-bottom:10px">현재 실적 기반 초기값 — 슬라이더로 조정하세요</div>
      <div class="sl-grid">
        <div><div class="sl-top"><span class="sl-n">월간 방문자</span><span class="sl-v" id="xv1"></span></div><input type="range" id="xr1" min="3000" max="50000" step="500"></div>
        <div><div class="sl-top"><span class="sl-n">방문 → 가입</span><span class="sl-v" id="xv2"></span></div><input type="range" id="xr2" min="0.1" max="8" step="0.1"></div>
        <div><div class="sl-top"><span class="sl-n">가입 → SDK 설치</span><span class="sl-v" id="xv3"></span></div><input type="range" id="xr3" min="1" max="50" step="1"></div>
        <div><div class="sl-top"><span class="sl-n">SDK → 유료 전환</span><span class="sl-v" id="xv4"></span></div><input type="range" id="xr4" min="1" max="20" step="0.5"></div>
        <div><div class="sl-top"><span class="sl-n">ARPPU (월)</span><span class="sl-v" id="xv5"></span></div><input type="range" id="xr5" min="100" max="1500" step="50"></div>
        <div><div class="sl-top"><span class="sl-n">남은 개월 수</span><span class="sl-v" id="xv6"></span></div><input type="range" id="xr6" min="1" max="9" step="1"></div>
      </div>
      <div class="sim-out">
        <div><div class="so-label">유료 조직 수</div><div class="so-val" id="sim-orgs">0</div></div>
        <div><div class="so-label">예상 MRR</div><div class="so-val" id="sim-mrr" style="color:var(--grn)">$0</div></div>
        <div><div class="so-label">목표 대비</div><div class="so-val" id="sim-pct">0%</div></div>
      </div>
    </div>
  </div>
  <div class="foot">
    <a href="https://docs.google.com/spreadsheets/d/1y2MlUqSHYMSefkVFoxo6Kh5YYTFWvk00R__nUWH7Afw/edit" target="_blank">Lead Measure ↗</a> ·
    <a href="https://docs.google.com/spreadsheets/d/145fp9fBz8qszcjSd45azGk0gU_s8coPfzf8i-Do_l8M/edit" target="_blank">Marketing KPI ↗</a> ·
    <a href="https://app.amplitude.com/analytics/ab180/dashboard/qsa1x9zt" target="_blank">Amplitude ↗</a>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const fmt=n=>n==null?'—':typeof n==='number'?n.toLocaleString('en-US'):String(n);
const fmtK=n=>n>=10000?(n/1000).toFixed(0)+'K':n>=1000?(n/1000).toFixed(1)+'K':fmt(n);
const pct=(n,d=2)=>n==null?'—':(n*100).toFixed(d)+'%';

const API='https://script.google.com/macros/s/AKfycbxrPNjj8t0p-AraZcwQtANMO-jTX1yOBPEUlLwVcOeC74Y3ZRQt6kG_1arsMkREbz8B/exec';
const T={mrr:35000,arppu:500,paid:80,vis_mo:11000,sig_mo:700,sdk_6mo:800,deadline:'2026-09-30'};
const BM={v2s:0.05,s2k:0.15,k2p:0.02};
const DRI={vis:'슬 · 재혁 · 채건',sig:'채건 (Website)',sdk:'승헌 (Agent)',paid:'Amy · 현탁'};
// Deep links to Amplitude/Sheets for each funnel card
const LINKS={
  vis:'https://app.amplitude.com/analytics/ab180/dashboard/qsa1x9zt',
  sig:'https://app.amplitude.com/analytics/ab180/chart/new/82od37ke',
  sdk:'https://docs.google.com/spreadsheets/d/1y2MlUqSHYMSefkVFoxo6Kh5YYTFWvk00R__nUWH7Afw/edit#gid=0',
  paid:'https://docs.google.com/spreadsheets/d/1y2MlUqSHYMSefkVFoxo6Kh5YYTFWvk00R__nUWH7Afw/edit#gid=0',
};

async function init(){
  let d;
  try{d=await(await fetch(API)).json()}catch(e){try{d=await(await fetch('data.json')).json()}catch(e2){$('loading').innerHTML='<p style="color:var(--red)">Load failed</p>';return}}
  $('loading').style.display='none';$('app').style.display='block';
  $('sync-ts').textContent='실시간 · '+(d.synced_at||'').slice(0,16).replace('T',' ');
  render(d);
}

function render(d){
  const amp=d.amplitude||{};const h=d.org_health||d.health||{};const wk=d.weekly_trend||[];const mkt=d.marketing||{};const cc=d.countries||[];
  // Extract actuals
  const vis30=amp.visitor?.count_30d||d.funnel?.stages?.find(s=>s.key==='visitor')?.count_30d||42082;
  const sig30=amp.signup?.count_30d||d.funnel?.stages?.find(s=>s.key==='signup')?.count_30d||382;
  const sdk30=amp.sdk_install?.count_30d||d.funnel?.stages?.find(s=>s.key==='sdk_install')?.count_30d||15;
  const paidSS=h.paid_self_serve||d.funnel?.stages?.find(s=>s.key==='paid')?.self_serve||13;
  const paidTotal=h.paid||114;
  const activeOrgs=h.active||107;
  const totalOrgs=h.total_orgs||3057;
  const mrr=paidSS*T.arppu;

  // Weekly arrays
  const wVis=amp.visitor?.weekly||[];const wSig=amp.signup?.weekly||[];const wSdk=amp.sdk_install?.weekly||[];

  // Conversions
  const cv_v2s=vis30>0?sig30/vis30:0;
  const cv_s2k=sig30>0?sdk30/sig30:0;
  const cv_k2p=sdk30>0?paidSS/sdk30:0;

  // === DUAL HERO ===
  const mrrPct=Math.min(100,(mrr/T.mrr)*100);
  const mrrColor=mrrPct>=60?'var(--grn)':mrrPct>=30?'var(--ylw)':'var(--red)';
  $('heroes').innerHTML=`
    <div class="hero-card">
      <div class="hero-label">활성 조직 (선행지표)</div>
      <div class="hero-val" style="color:var(--acc)">${fmt(activeOrgs)}</div>
      <div class="hero-sub">전체 <b>${fmt(totalOrgs)}</b>개 중 · 활성률 ${(activeOrgs/totalOrgs*100).toFixed(1)}%</div>
      <div class="hero-bar"><div class="hero-fill" style="width:${(activeOrgs/totalOrgs*100)}%;background:var(--acc)"></div></div>
    </div>
    <div class="hero-card">
      <div class="hero-label">MRR (후행지표)</div>
      <div class="hero-val" style="color:${mrrColor}">$${fmt(mrr)}</div>
      <div class="hero-sub">목표 <b>$${fmt(T.mrr)}</b> · 남은 금액 <b>$${fmt(T.mrr-mrr)}</b></div>
      <div class="hero-bar"><div class="hero-fill" style="width:${mrrPct}%;background:${mrrColor}"></div></div>
      <div class="hero-bar-label"><span>$0</span><span>${mrrPct.toFixed(0)}%</span><span>$35K</span></div>
    </div>`;

  // === COUNTDOWN ===
  const now=new Date();const dl=new Date('2026-09-30');const daysLeft=Math.max(0,Math.ceil((dl-now)/(86400000)));
  const monthsLeft=Math.max(1,Math.ceil(daysLeft/30));
  const orgsNeeded=T.paid-paidSS;const orgsPerMonth=Math.ceil(orgsNeeded/monthsLeft);
  const mrrPerMonth=Math.ceil((T.mrr-mrr)/monthsLeft);
  $('countdown').innerHTML=`
    <div class="cd-item"><div class="cd-val">${daysLeft}</div><div class="cd-label">남은 일수</div></div>
    <div class="cd-item"><div class="cd-val" style="color:var(--red)">+${orgsNeeded}</div><div class="cd-label">필요 유료 조직</div></div>
    <div class="cd-item"><div class="cd-val">${orgsPerMonth}</div><div class="cd-label">월간 확보 목표</div></div>
    <div class="cd-item"><div class="cd-val">+$${fmtK(mrrPerMonth)}</div><div class="cd-label">월간 MRR 증가</div></div>`;

  // === BOTTLENECK (top 2) ===
  const gaps=[{k:'Visit→Signup',r:cv_v2s/BM.v2s,conv:cv_v2s,bm:BM.v2s,dri:DRI.sig},{k:'Signup→SDK',r:cv_s2k/BM.s2k,conv:cv_s2k,bm:BM.s2k,dri:DRI.sdk}];
  gaps.sort((a,b)=>a.r-b.r);
  $('bottleneck').innerHTML=gaps.map((g,i)=>{
    const sev=g.r<0.4?'red':'ylw';
    return`<div class="banner ${sev==='red'?'red':''}" style="${sev!=='red'?'background:var(--ylwg);border:1px solid rgba(234,179,8,.2);margin-bottom:8px':'margin-bottom:8px'}">
      <div>${i===0?'⚠️':'⚡'}</div>
      <div><div class="btitle">#${i+1} 병목: ${g.k} — ${pct(g.conv,2)} (벤치마크 ${pct(g.bm,0)}의 ${(g.r*100).toFixed(0)}%)</div>
      <div class="bdesc">담당: ${g.dri}</div></div>
    </div>`}).join('');

  // === FUNNEL CARDS (4: Visitor, Signup, SDK, Paid — no Activation) ===
  const stages=[
    {label:'방문자',actual:vis30,target:T.vis_mo,tLabel:fmtK(T.vis_mo)+'/월',dri:DRI.vis,conv:null,bm:null,weekly:wVis,link:LINKS.vis},
    {label:'가입',actual:sig30,target:T.sig_mo,tLabel:fmt(T.sig_mo)+'/월',dri:DRI.sig,conv:cv_v2s,bm:BM.v2s,weekly:wSig,link:LINKS.sig},
    {label:'SDK 설치',actual:sdk30,target:Math.round(T.sdk_6mo/6),tLabel:fmt(T.sdk_6mo)+'개 (6개월)',dri:DRI.sdk,conv:cv_s2k,bm:BM.s2k,weekly:wSdk,link:LINKS.sdk},
    {label:'유료 전환',actual:paidSS,target:T.paid,tLabel:fmt(T.paid)+'개',dri:DRI.paid,conv:cv_k2p,bm:BM.k2p,weekly:[],extra:`+${paidTotal-paidSS} contract`,link:LINKS.paid},
  ];

  // Find worst
  let worstIdx=-1,worstR=1;
  stages.forEach((s,i)=>{if(s.bm&&s.conv!==null){const r=s.conv/s.bm;if(r<worstR){worstR=r;worstIdx=i}}});

  // DRI border colors
  const driColors=['#818cf8','#818cf8','#f59e0b','#10b981'];

  $('funnel').innerHTML=stages.map((s,i)=>{
    const rawGapPct=s.target?(s.actual/s.target)*100:0;
    const gapPct=Math.min(100,rawGapPct);

    // Visitor over-target: volume OK but quality problem → amber, not green
    const isVisitorOverTarget=i===0&&rawGapPct>100;
    const isLowQuality=isVisitorOverTarget&&cv_v2s<BM.v2s*0.5;
    const gapColor=isLowQuality?'var(--ylw)':gapPct>=80?'var(--grn)':gapPct>=40?'var(--ylw)':'var(--red)';

    // Conv badge (SDK gets asterisk for cohort lag)
    let badge='';
    if(s.conv!==null&&s.bm){
      const r=s.conv/s.bm;const cls=r>=0.8?'grn':r>=0.4?'ylw':'red';
      const asterisk=s.label.includes('SDK')?'*':'';
      badge=`<div class="f-conv ${cls}">${pct(s.conv,1)}${asterisk}</div>`;
    }

    // WoW inline with actual (stock-ticker style)
    let wowHtml='';
    if(s.weekly&&s.weekly.length>=2){
      const last=s.weekly[s.weekly.length-1];const prev=s.weekly[s.weekly.length-2];
      if(prev>0){const ch=((last-prev)/prev);wowHtml=` <span style="font-size:12px;font-weight:700;color:${ch>=0?'var(--grn)':'var(--red)'}"> ${ch>=0?'↑':'↓'}${Math.abs(ch*100).toFixed(0)}%</span>`}
    }

    // Sparkline
    let spark='';
    if(s.weekly&&s.weekly.length>0){const mx=Math.max(...s.weekly,1);spark=`<div class="spark">${s.weekly.map(v=>`<div style="height:${Math.max(2,(v/mx)*24)}px;background:${gapColor}"></div>`).join('')}</div>`}

    // Gap text
    let gapText='';
    if(isLowQuality){gapText='트래픽 충분 · 전환율이 문제'}
    else if(rawGapPct>=100){gapText='✓ 목표 달성'}
    else{gapText='부족: '+fmtK(s.target-s.actual)}

    // Paid orgs: split view
    let actualHtml=`<span class="f-actual" style="color:${isLowQuality?'var(--ylw)':rawGapPct>=100?'var(--grn)':gapColor}">${fmtK(s.actual)}</span>${wowHtml}`;
    if(s.label.includes('Paid')){
      actualHtml=`<span class="f-actual" style="color:${gapColor}">${paidSS}</span><span style="font-size:14px;color:var(--tx3)"> / ${paidTotal}</span>${wowHtml}`;
    }

    // SDK footnote
    let sdkNote='';
    if(s.label.includes('SDK')){sdkNote=`<div style="font-size:7px;color:var(--ylw);margin-top:2px">* 동일 기간 기준 — 코호트별 추적 시 다를 수 있음</div>`}

    const linkAttr=s.link?` onclick="window.open('${s.link}','_blank')" style="cursor:pointer;border-left:3px solid ${driColors[i]}"`:` style="border-left:3px solid ${driColors[i]}"`;

    return `<div class="fc${i===worstIdx?' worst':''}"${linkAttr} title="클릭하면 상세 데이터로 이동">
      ${badge}
      <div class="f-stage">${s.label}</div>
      <div class="f-dri">${s.dri}</div>
      <div>${actualHtml}</div>
      ${s.label.includes('Paid')?`<div style="display:flex;height:4px;border-radius:2px;overflow:hidden;margin-top:4px"><div style="width:${paidSS/paidTotal*100}%;background:var(--acc)"></div><div style="width:${(paidTotal-paidSS)/paidTotal*100}%;background:var(--grn);opacity:0.3"></div></div><div style="font-size:8px;color:var(--tx3);margin-top:2px">SS ${paidSS} · Contract ${paidTotal-paidSS}</div>`:''}
      ${s.extra&&!s.label.includes('Paid')?`<span style="font-size:9px;color:var(--tx3)">${s.extra}</span>`:''}
      ${sdkNote}
      <div class="f-target"><span>목표: <b>${s.tLabel}</b></span><span class="f-gap-pct" style="color:${isLowQuality?'var(--ylw)':rawGapPct>=100?'var(--grn)':gapColor}">${isLowQuality?'⚡ 트래픽 충분':rawGapPct>=100?'✓ '+rawGapPct.toFixed(0)+'%':gapPct.toFixed(0)+'%'}</span></div>
      <div class="f-gap-track"><div class="f-gap-fill" style="width:${gapPct}%;background:${isLowQuality?'var(--ylw)':rawGapPct>=100?'var(--grn)':gapColor}"></div></div>
      <div style="font-size:8px;color:var(--tx3);margin-top:2px;text-align:right">${gapText}</div>
      ${spark}
    </div>`}).join('');

  // === ORG HEALTH (without churned dominating) ===
  const alive=totalOrgs-(h.churned||2284);
  const items=[
    {l:'온보딩',v:h.onboarding||356,c:'var(--acc)'},
    {l:'활성',v:h.active||107,c:'var(--grn)'},
    {l:'유료',v:h.paid||114,c:'#10b981'},
    {l:'이탈 위험',v:(h.churn_risk_onboarding||127)+(h.churn_risk_activation||69),c:'var(--ylw)'},
  ];
  const atRiskRate=h.onboarding>0?((h.churn_risk_onboarding||0)/h.onboarding*100):0;
  const atRiskColor=atRiskRate<=20?'var(--grn)':atRiskRate<=40?'var(--ylw)':'var(--red)';
  $('health').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
    <div><span style="font-size:18px;font-weight:800">${fmt(alive)}</span> <span style="font-size:10px;color:var(--tx3)">활성 조직 (이탈 ${fmtK(h.churned||2284)}개 제외)</span></div>
    <div style="font-size:11px">이탈 위험: <b style="color:${atRiskColor}">${atRiskRate.toFixed(0)}%</b> <span style="font-size:9px;color:var(--tx3)">온보딩 중</span></div>
  </div>`+items.map(x=>`<div class="mbar"><span class="ml" style="color:${x.c}">${fmtK(x.v)}</span><div class="mt"><div class="mf" style="width:${(x.v/alive)*100}%;background:${x.c}"></div></div><span class="mv">${x.l}</span></div>`).join('');

  // === WEEKLY (stacked: healthy vs churned) ===
  if(wk.length>0){const mx=Math.max(...wk.map(w=>w.total||0),1);$('weekly').innerHTML=`<div style="display:flex;align-items:flex-end;gap:2px;height:90px">${wk.map(w=>{
    const ht=Math.max(3,(w.total/mx)*70);
    const healthy=(w.onboarding||0)+(w.active||0)+(w.paid||0);
    const risk=(w.churn_risk_onboarding||0)+(w.churn_risk_activation||0);
    const churned=w.churned||0;
    const hPct=w.total>0?healthy/w.total*100:0;
    const rPct=w.total>0?risk/w.total*100:0;
    const cPct=w.total>0?churned/w.total*100:0;
    const net=healthy+risk;
    return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
      <div style="font-size:7px;font-weight:700;margin-bottom:1px">${w.total}<span style="color:var(--grn);font-size:6px"> (${net})</span></div>
      <div style="width:85%;height:${ht}px;border-radius:2px 2px 0 0;overflow:hidden;display:flex;flex-direction:column">
        <div style="flex:${cPct};background:var(--red);opacity:.5"></div>
        <div style="flex:${rPct};background:var(--ylw);opacity:.6"></div>
        <div style="flex:${hPct};background:var(--grn)"></div>
      </div>
      <div style="font-size:6px;color:var(--tx3);margin-top:2px">${String(w.week).slice(5)}</div>
    </div>`}).join('')}</div>
    <div style="display:flex;gap:8px;margin-top:6px;font-size:8px;color:var(--tx3)">
      <span><span style="display:inline-block;width:6px;height:6px;background:var(--grn);border-radius:1px"></span> 건강</span>
      <span><span style="display:inline-block;width:6px;height:6px;background:var(--ylw);border-radius:1px;opacity:.6"></span> 위험</span>
      <span><span style="display:inline-block;width:6px;height:6px;background:var(--red);border-radius:1px;opacity:.5"></span> 이탈</span>
    </div>`}

  // === CAC BY CHANNEL ===
  const allCh=mkt.channels||[];
  const activeCh=allCh.filter(c=>c.signup_forecast>0).sort((a,b)=>b.signup_forecast-a.signup_forecast);
  const wasteCh=allCh.filter(c=>{const cost=parseFloat(String(c.monthly_cost_usd).replace(/[$,]/g,''))||0;return cost>0&&c.signup_forecast<=0});
  const wasteTotal=wasteCh.reduce((s,c)=>s+(parseFloat(String(c.monthly_cost_usd).replace(/[$,]/g,''))||0),0);
  if(activeCh.length>0||wasteCh.length>0){
    const maxSig=Math.max(...activeCh.map(c=>c.signup_forecast),1);
    let html=activeCh.map(c=>{
      const cost=parseFloat(String(c.monthly_cost_usd).replace(/[$,]/g,''))||0;
      const sigs=c.signup_forecast||0;
      const cac=sigs>0?Math.round(cost/sigs):0;
      const cacColor=cac===0?'var(--grn)':cac<=50?'var(--grn)':cac<=150?'var(--ylw)':'var(--red)';
      const cacLabel=cac===0?'Organic':'$'+fmt(cac);
      const barW=(sigs/maxSig)*100;
      return`<div class="cac-row">
        <span class="cac-name">${c.channel}</span>
        <div class="cac-bar-wrap"><div class="cac-bar" style="width:${barW}%;background:var(--acc)"></div></div>
        <span class="cac-val">${sigs} signups</span>
        <span class="cac-badge" style="background:${cacColor}20;color:${cacColor}">CAC ${cacLabel}</span>
      </div>`}).join('');
    if(wasteTotal>0){
      html+=`<div class="waste">가입 0건 지출: ${wasteCh.map(c=>c.channel+' $'+parseFloat(String(c.monthly_cost_usd).replace(/[$,]/g,'')||0)).join(' + ')} = <b>월 $${fmt(wasteTotal)} 낭비</b></div>`;
    }
    $('cac').innerHTML=html;
  }

  // === COUNTRIES (sorted by active_pct) ===
  if(cc.length>0){
    const sorted=[...cc].sort((a,b)=>parseFloat(b.active_pct)-parseFloat(a.active_pct));
    const mx=Math.max(...sorted.map(c=>c.orgs),1);
    $('countries').innerHTML=sorted.slice(0,8).map(c=>{
      const apct=parseFloat(c.active_pct)||0;
      const aColor=apct>=10?'var(--grn)':apct>=5?'var(--ylw)':'var(--tx3)';
      return`<div class="mbar"><span class="ml">${c.country}</span><div class="mt"><div class="mf" style="width:${(c.orgs/mx)*100}%;background:var(--acc)"></div></div><span class="mv">${fmt(c.orgs)} · <b style="color:${aColor}">${c.active_pct}</b></span></div>`
    }).join('');
  }

  // === SIMULATOR (init with CURRENT actuals, not targets) ===
  const curVis=Math.round(vis30);const curSig=cv_v2s*100;const curSdk=cv_s2k*100;const curPaid=cv_k2p>0?cv_k2p*100:5;
  $('xr1').value=curVis;$('xr1').max=Math.max(50000,curVis*2);
  $('xr2').value=curSig.toFixed(1);
  $('xr3').value=Math.round(curSdk);$('xr3').min=1;
  $('xr4').value=curPaid.toFixed(1);
  $('xr5').value=T.arppu;
  const mLeft=Math.max(1,Math.ceil(daysLeft/30));$('xr6').value=mLeft;
  ['xr1','xr2','xr3','xr4','xr5','xr6'].forEach(id=>$(id).addEventListener('input',sim));
  sim();
}

function sim(){
  const v=+$('xr1').value,s=+$('xr2').value/100,k=+$('xr3').value/100,p=+$('xr4').value/100,a=+$('xr5').value,m=+$('xr6').value;
  $('xv1').textContent=fmt(v);$('xv2').textContent=(s*100).toFixed(1)+'%';$('xv3').textContent=(k*100).toFixed(0)+'%';
  $('xv4').textContent=(p*100).toFixed(1)+'%';$('xv5').textContent='$'+fmt(a);$('xv6').textContent=m;
  const orgs=Math.round(v*m*s*k*p);const mr=orgs*a;const vs=Math.min(100,(mr/35000)*100);
  $('sim-orgs').textContent=fmt(orgs);
  $('sim-mrr').textContent='$'+fmt(mr);$('sim-mrr').style.color=mr>=35000?'var(--grn)':'var(--ylw)';
  $('sim-pct').textContent=vs.toFixed(0)+'%';$('sim-pct').style.color=vs>=100?'var(--grn)':'var(--ylw)';
}
// Slack copy
function copySlack(){
  const el=$('funnel');if(!el)return;
  const cards=el.querySelectorAll('.fc');
  const lines=['*Core Plan 퍼널 현황* ('+new Date().toLocaleDateString('ko-KR')+')',''];
  const cdEl=$('countdown');
  if(cdEl){
    const vals=cdEl.querySelectorAll('.cd-val');
    if(vals.length>=4)lines.push(`D-${vals[0].textContent} | 유료 조직: ${vals[1].textContent}개 필요 | 월 ${vals[2].textContent}개 확보 목표`,'');
  }
  cards.forEach(c=>{
    const stage=c.querySelector('.f-stage')?.textContent||'';
    const actual=c.querySelector('.f-actual')?.textContent||'';
    const pctEl=c.querySelector('.f-gap-pct');
    const pctTxt=pctEl?pctEl.textContent:'';
    const conv=c.querySelector('.f-conv')?.textContent||'';
    const emoji=pctTxt.includes('✓')?'✅':parseInt(pctTxt)>=40?'🟡':'🔴';
    lines.push(`${emoji} ${stage}: *${actual}* (목표 대비 ${pctTxt})${conv?' · 전환율 '+conv:''}`);
  });
  lines.push('','대시보드: https://owenchoi-kr.github.io/full-funnel-dashboard/');
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const btn=document.querySelector('.slack-btn');
    btn.textContent='복사 완료!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Slack에 복사';btn.classList.remove('copied')},2000);
  });
}

init();
</script>
</body>
